<script>
// ════════════════════════════════════════════════════════════
//  PAPERS DATA  — add new entries anywhere, auto-sorted newest first
//  Add a `year` (and optionally `month`) field to control ordering.

const papersData = [
    {
        id: "gfm-3dv-2026",
        title: "GfM: Road-Relative, Metric, Self-Supervised Monocular Geometry for Vehicular Applications",
        authors: "Gasser Elazab et al.",
        venue: "3DV 2026",
        venueFull: "International Conference on 3D Vision, 2026",
        venueClass: "venue-3dv",
        year: 2026, month: 3,
        image: "docs/paper_images/GfM.png",
        links: [
            { label: "arXiv", url: "https://arxiv.org/abs/2512.04303" },
            { label: "PDF",   url: "https://arxiv.org/pdf/2512.04303" },
            { label: "Proceedings", url: "" }
        ],
        abstract: "Ground-relative metric depth estimation for autonomous driving using a novel road-field-based scale prior and self-supervised learning on large-scale driving datasets."
    },
    {
        id: "card-cvpr-2026",
        title: "CARD: A Multi-Modal Automotive Dataset for Dense 3D Reconstruction in Challenging Road Topography",
        authors: "First Author",
        venue: "CVPR 2026",
        venueFull: "IEEE/CVF Conference on Computer Vision and Pattern Recognition, 2026",
        venueClass: "venue-cvpr",
        year: 2026, month: 6,
        image: "docs/paper_images/CARD_image.png",
        links: [
            { label: "Proceedings", url: "" }
        ],
        abstract: "Category-aware representation for semantic scene flow estimation in autonomous driving, enabling richer motion understanding across object classes."
    },
    {
        id: "monopp-wacv-2025",
        title: "MonoPP: Metric-Scaled Self-Supervised Monocular Depth Estimation by Planar-Parallax Geometry in Automotive Applications",
        authors: "Gasser Elazab et al.",
        venue: "WACV 2025",
        venueFull: "IEEE/CVF Winter Conference on Applications of Computer Vision, 2025",
        venueClass: "venue-wacv",
        year: 2025, month: 1,
        image: "docs/paper_images/monopp.png",
        links: [
            { label: "Project Page", url: "https://mono-pp.github.io/" },
            { label: "arXiv",        url: "" },
            { label: "Proceedings",  url: "" }
        ],
        abstract: "Metric-scaled self-supervised monocular depth estimation leveraging planar parallax geometry to recover real-world scale without LiDAR or stereo supervision."
    },
    // ── Add new papers above this line ──────────────────────────
    // { id, title, authors, venue, venueFull, venueClass, year, month, image, links, abstract }
];

function paperImgFallback(imgEl, venue) {
    const colorMap = { CVPR: '#dc2626', WACV: '#ea580c', '3DV': '#2563eb', ICCV: '#16a34a', ECCV: '#9333ea' };
    const key   = Object.keys(colorMap).find(k => venue.includes(k)) || 'CONF';
    const color = colorMap[key] || '#2563eb';
    const svg   = `<svg xmlns="http://www.w3.org/2000/svg" width="220" height="160">
        <rect fill="${color}" width="220" height="160"/>
        <text fill="rgba(255,255,255,0.9)" font-family="Inter,sans-serif" font-size="18" font-weight="700"
              x="110" y="86" text-anchor="middle">${key}</text>
    </svg>`;
    imgEl.src    = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    imgEl.onerror = null;
}

function renderPapers() {
    const container = document.getElementById('papers-container');
    if (!papersData.length) return;
    // Auto-sort: newest year first, then newest month first
    const sorted = [...papersData].sort((a, b) =>
        b.year !== a.year ? b.year - a.year : (b.month || 0) - (a.month || 0)
    );
    container.innerHTML = sorted.map(p => `
        <div class="paper-card">
            <div class="paper-img-wrap">
                <img src="${p.image}"
                     alt="${p.title}"
                     onerror="paperImgFallback(this,'${p.venue}')"
                     loading="lazy">
                <span class="venue-badge ${p.venueClass}">${p.venue}</span>
            </div>
            <div class="paper-content">
                <h3 class="paper-title">${p.title}</h3>
                <p class="paper-authors">${p.authors}</p>
                <p class="paper-venue-full">${p.venueFull}</p>
                <p class="paper-abstract">${p.abstract}</p>
                <div class="paper-links">
                    ${p.links.filter(l => l.url).map(l =>
                        `<a href="${l.url}" target="_blank" rel="noopener" class="pill-link">${l.label}</a>`
                    ).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

renderPapers();
</script>
